name: Auto Version

on:
  push:
    branches: [master, staging]

jobs:
  version:
    runs-on: web-default
    if: >-
      ${{ !contains(github.event.head_commit.message, '[skip ci]') &&
          !contains(github.event.head_commit.message, '[ci skip]') }}
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Auto Version
        uses: ./
        with:
          version-file: VERSION
          github-token: ${{ secrets.GITHUB_TOKEN }}
          github-api-url: ${{ github.api_url }}
          update-floating-tags: "true"

      - name: Sync to GitHub.com
        shell: bash
        env:
          GITHUB_COM_TOKEN: ${{ secrets.GITHUB_COM_TOKEN }}
          GITHUB_REF_NAME: ${{ github.ref_name }}
        run: |
          if [ -z "${GITHUB_COM_TOKEN:-}" ]; then
            echo "::warning::GITHUB_COM_TOKEN not set, skipping GitHub.com sync"
            exit 0
          fi
          REMOTE_URL="https://x-access-token:${GITHUB_COM_TOKEN}@github.com/lucaspretti/auto-version-action.git"
          git remote add github-sync "$REMOTE_URL" 2>/dev/null || \
            git remote set-url github-sync "$REMOTE_URL"
          git fetch origin --tags --force
          echo "Syncing branch ${GITHUB_REF_NAME} to GitHub.com..."
          git push github-sync "HEAD:refs/heads/${GITHUB_REF_NAME}"
          echo "Syncing tags to GitHub.com..."
          git push github-sync --tags --force
          echo "Sync complete"
